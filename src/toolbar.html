<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Toolbar</title>
<link rel="stylesheet" href="toolbar.css" />
</head>
<body>
  <div class="drag-region"></div>

  <div id="tabbar" class="tabbar">
    <div id="tabs-list" class="tabs-list"></div>
    <div id="window-controls" class="window-controls" style="display:none;">
      <button id="win-minimize" class="win-btn" title="Minimize">
        <svg viewBox="0 0 10 10"><path d="M1 5h8" stroke="currentColor" stroke-width="1" /></svg>
      </button>
      <button id="win-maximize" class="win-btn" title="Maximize">
        <svg viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1" /></svg>
      </button>
      <button id="win-close" class="win-btn win-close" title="Close">
        <svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.2" /></svg>
      </button>
    </div>
  </div>

  <div class="navbar">
    <div class="nav-buttons">
      <button id="back" class="icon-btn" title="Back">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="forward" class="icon-btn" title="Forward">
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="reload" class="icon-btn" title="Reload">
        <svg viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5M4.5 9a8 8 0 0 1 14-3.5M19.5 15a8 8 0 0 1-14 3.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="address-wrap">
      <svg class="lock" viewBox="0 0 24 24"><path d="M6 10V8a6 6 0 0 1 12 0v2M5 10h14v10H5z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/></svg>
      <input id="address" class="address" type="text" spellcheck="false" placeholder="Search or enter address" />
    </div>

    <button id="new-tab" class="icon-btn new-tab" title="New tab">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <button id="update-pill" class="update-pill" style="display:none;" title="Click to restart and update">
      <svg viewBox="0 0 24 24"><path d="M12 3v10m0 0l4-4m-4 4l-4-4M5 21h14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="update-pill-text">Update ready</span>
    </button>
  </div>

  <script src="toolbar.js"></script>
</body>
</html>
